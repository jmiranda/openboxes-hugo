<div class="timeline-grid">
    {{ range $.Site.Data.milestones }}
    <div class="timeline-card">
        {{ with .image }}
        <a href="{{ . }}" target="_blank">
            <img src="{{ . }}" class="timeline-card-image" />
        </a>
        {{ end }}
        <div class="timeline-card-body">
            <span class="timeline-card-year">{{ .year }}</span>
            <h4 class="timeline-card-title">{{ .title }}</h4>
            <p class="timeline-card-text">{{ .text }}</p>
        </div>
    </div>
    {{ end }}
</div>
