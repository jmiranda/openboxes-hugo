    rate = 110
    price = 52800
    savings = 19200
    description = "e.g., Multi-facility rollout with custom development and integrations"
    payment_url = "https://buy.stripe.com/REPLACE_WITH_ENTERPRISE_PACKAGE_LINK"

[params.support]
    enable = true

