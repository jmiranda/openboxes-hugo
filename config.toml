[params.services.packages.growth]
    weight = 2
    name = "Growth"
    hours = 160
    rate = 120
    price = 19200
    savings = 4800
    description = "e.g., Full implementation from discovery through go-live"
    payment_url = "https://buy.stripe.com/REPLACE_WITH_GROWTH_PACKAGE_LINK"

[params.services.packages.enterprise]
    weight = 3
    name = "Enterprise"
